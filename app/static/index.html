<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MarKor Network ESP Programmer</title>

<link rel="stylesheet" href="/static/css/style.css?v=1">
</head>

<body>

<header>
    MarKor Network ESP Programmer
</header>

<div class="container">

    <div class="card">
        <h2>Programmers</h2>

        <select id="programmers"></select>

        <button id="refresh">
            Refresh
        </button>
    </div>

    <div class="card">
        <h2>Add programmer</h2>

        <input id="name" placeholder="Programmer name">

        <input id="host" placeholder="IP address">

        <input id="port" value="3333" placeholder="Port">

        <button id="add">
            Add programmer
        </button>
    </div>

    <div class="card">
        <h2>ESP</h2>

        <button id="chipid">
            Read chip information
        </button>

        <input type="file" id="firmware">

        <input id="address" value="0x0">

        <button id="flash">
            Flash firmware
        </button>
    </div>

    <div class="card">
        <h2>Log</h2>

        <pre id="log"></pre>
    </div>

</div>

<script type="module" src="/static/js/app.js?v=2"></script>

</body>
</html>
